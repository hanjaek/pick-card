<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1340" viewBox="0 0 2000 1340" font-family="'Apple SD Gothic Neo','Malgun Gothic','Pretendard',sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#546E7A"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1565C0"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8E24AA"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="2000" height="1340" fill="#FAFBFC"/>

  <!-- Title -->
  <text x="1000" y="55" text-anchor="middle" font-size="34" font-weight="700" fill="#1A237E">BNK Pickard(BNK 라이프) 서비스 아키텍처</text>
  <text x="1000" y="85" text-anchor="middle" font-size="16" fill="#607D8B">Docker Compose 기반 컨테이너 분리 구조 · React SPA + Node.js WAS 이중화 + Python RAG/OCR AI 서버</text>

  <!-- Client -->
  <rect x="850" y="110" width="300" height="72" rx="10" fill="#FFFFFF" stroke="#90A4AE" stroke-width="2" filter="url(#shadow)"/>
  <text x="1000" y="140" text-anchor="middle" font-size="17" font-weight="700" fill="#37474F">사용자 브라우저</text>
  <text x="1000" y="163" text-anchor="middle" font-size="13" fill="#607D8B">React SPA (Client)</text>

  <line x1="1000" y1="182" x2="1000" y2="228" stroke="#546E7A" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="1015" y="210" font-size="12" fill="#607D8B">HTTPS :3000</text>

  <!-- Docker Host Boundary (x40~1770, y232~1012) -->
  <rect x="40" y="232" width="1730" height="780" rx="14" fill="#F3F9FF" stroke="#2496ED" stroke-width="2.5" stroke-dasharray="10,6"/>
  <text x="65" y="266" font-size="19" font-weight="700" fill="#2496ED">🐳 Docker Compose 네트워크 (bridge, 172.28.0.0/16)</text>
  <text x="65" y="288" font-size="12.5" fill="#5A6B78">컨테이너 단위로 완전 분리 · 헬스체크 &amp; restart:unless-stopped 로 자동 복구 · 볼륨으로 데이터 영속화</text>

  <!-- Frontend container -->
  <rect x="790" y="310" width="420" height="100" rx="10" fill="#E8F6FD" stroke="#29B6F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="1000" y="336" text-anchor="middle" font-size="16" font-weight="700" fill="#01579B">frontend (Nginx) — 단일 진입점</text>
  <text x="1000" y="358" text-anchor="middle" font-size="12.5" fill="#0277BD">React 18 정적 빌드 서빙 · 호스트 3000 → 컨테이너 80</text>
  <text x="1000" y="378" text-anchor="middle" font-size="12.5" fill="#0277BD">/api, /uploads → 백엔드 리버스 프록시 + 로드밸런싱(round-robin)</text>
  <text x="1000" y="398" text-anchor="middle" font-size="11.5" fill="#0288D1">container: pickard-frontend · image: pickard-frontend:local</text>

  <!-- LB arrows -->
  <path d="M 880 410 L 610 458" stroke="#1565C0" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M 1120 410 L 1400 458" stroke="#1565C0" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="700" y="435" font-size="12" fill="#1565C0">LB</text>
  <text x="1280" y="435" font-size="12" fill="#1565C0">LB</text>

  <!-- WAS server-1 -->
  <rect x="380" y="460" width="380" height="132" rx="10" fill="#EAF7EE" stroke="#68A063" stroke-width="2" filter="url(#shadow)"/>
  <text x="570" y="486" text-anchor="middle" font-size="16" font-weight="700" fill="#2E5D34">pickard-server-1 (WAS)</text>
  <text x="570" y="508" text-anchor="middle" font-size="12.5" fill="#3C6E42">Node.js 18 + Express · :4000</text>
  <text x="570" y="526" text-anchor="middle" font-size="12.5" fill="#3C6E42">JWT / bcrypt / multer / mysql2</text>
  <text x="570" y="544" text-anchor="middle" font-size="12.5" fill="#3C6E42">express-session (Redis 저장)</text>
  <text x="570" y="565" text-anchor="middle" font-size="11" fill="#4E7C54">/api/health 헬스체크 · 한 대 죽어도 무중단</text>
  <text x="570" y="582" text-anchor="middle" font-size="11" fill="#4E7C54">image: pickard2-server:local</text>

  <!-- WAS server-2 -->
  <rect x="1240" y="460" width="380" height="132" rx="10" fill="#EAF7EE" stroke="#68A063" stroke-width="2" filter="url(#shadow)"/>
  <text x="1430" y="486" text-anchor="middle" font-size="16" font-weight="700" fill="#2E5D34">pickard-server-2 (WAS)</text>
  <text x="1430" y="508" text-anchor="middle" font-size="12.5" fill="#3C6E42">Node.js 18 + Express · :4000</text>
  <text x="1430" y="526" text-anchor="middle" font-size="12.5" fill="#3C6E42">JWT / bcrypt / multer / mysql2</text>
  <text x="1430" y="544" text-anchor="middle" font-size="12.5" fill="#3C6E42">express-session (Redis 저장)</text>
  <text x="1430" y="565" text-anchor="middle" font-size="11" fill="#4E7C54">동일 이미지로 수평 확장(스케일 아웃)</text>
  <text x="1430" y="582" text-anchor="middle" font-size="11" fill="#4E7C54">image: pickard2-server:local</text>

  <!-- Arrows servers -> data layer -->
  <path d="M 460 592 L 330 660" stroke="#546E7A" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 590 592 L 800 660" stroke="#546E7A" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 700 592 L 900 660" stroke="#546E7A" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <path d="M 1340 592 L 1150 660" stroke="#546E7A" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 1420 592 L 1250 660" stroke="#546E7A" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- server2 <-> RAG bidirectional (card indexing) -->
  <path d="M 1570 592 L 1570 658" stroke="#00897B" stroke-width="2" fill="none" marker-end="url(#arrow)" marker-start="url(#arrow)"/>

  <!-- MySQL -->
  <rect x="140" y="660" width="330" height="150" rx="10" fill="#FFF3E0" stroke="#EF6C00" stroke-width="2" filter="url(#shadow)"/>
  <text x="305" y="688" text-anchor="middle" font-size="16" font-weight="700" fill="#8A4B00">MySQL 8.0</text>
  <text x="305" y="710" text-anchor="middle" font-size="12.5" fill="#A15A00">container: pickard-mysql · :3306</text>
  <text x="305" y="730" text-anchor="middle" font-size="12.5" fill="#A15A00">DB: bnk_life / bnk_card</text>
  <text x="305" y="750" text-anchor="middle" font-size="12.5" fill="#A15A00">schema.sql 자동 초기 시드</text>
  <text x="305" y="770" text-anchor="middle" font-size="12.5" fill="#A15A00">유저/카드/신청/약관 데이터</text>
  <text x="305" y="796" text-anchor="middle" font-size="11" fill="#B06A10">volume: mysql-data (영속화)</text>

  <!-- Redis HA cluster -->
  <rect x="710" y="660" width="580" height="220" rx="10" fill="#FDEDED" stroke="#DC382D" stroke-width="2" filter="url(#shadow)"/>
  <text x="1000" y="688" text-anchor="middle" font-size="16" font-weight="700" fill="#A32017">Redis 7 — HA 클러스터 (세션 &amp; 캐시)</text>

  <rect x="730" y="704" width="160" height="56" rx="8" fill="#FFFFFF" stroke="#DC382D" stroke-width="1.5"/>
  <text x="810" y="726" text-anchor="middle" font-size="12.5" font-weight="700" fill="#A32017">Master</text>
  <text x="810" y="744" text-anchor="middle" font-size="11" fill="#B5463C">:6379</text>

  <rect x="905" y="704" width="160" height="56" rx="8" fill="#FFFFFF" stroke="#DC382D" stroke-width="1.5"/>
  <text x="985" y="726" text-anchor="middle" font-size="12.5" font-weight="700" fill="#A32017">Replica</text>
  <text x="985" y="744" text-anchor="middle" font-size="11" fill="#B5463C">:6380</text>

  <rect x="1080" y="704" width="190" height="56" rx="8" fill="#FFFFFF" stroke="#DC382D" stroke-width="1.5"/>
  <text x="1175" y="722" text-anchor="middle" font-size="12.5" font-weight="700" fill="#A32017">Sentinel x 3</text>
  <text x="1175" y="740" text-anchor="middle" font-size="11" fill="#B5463C">:26379 · 쿼럼 2 · 자동 페일오버</text>

  <path d="M 890 732 L 905 732" stroke="#A32017" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1000" y="778" text-anchor="middle" font-size="12" fill="#A32017">→ 서버 2대의 세션(session) 공유 저장소 · 마스터 장애 시 자동 승격</text>
  <text x="1000" y="800" text-anchor="middle" font-size="12" fill="#A32017">RedisInsight(:5540)로 모니터링 · sentinel.conf / master.conf / replica.conf</text>
  <text x="1000" y="822" text-anchor="middle" font-size="11" fill="#B5463C">volumes: master-data, replica-data, sentinel-data ×3</text>
  <text x="1000" y="844" text-anchor="middle" font-size="11" fill="#B5463C">containers: redis-master · redis-replica · redis-sentinel-1/2/3 · redisinsight</text>

  <!-- RAG/OCR AI server -->
  <rect x="1400" y="660" width="340" height="220" rx="10" fill="#E0F2F1" stroke="#00897B" stroke-width="2" filter="url(#shadow)"/>
  <text x="1570" y="686" text-anchor="middle" font-size="15.5" font-weight="700" fill="#00594E">pickard-rag</text>
  <text x="1570" y="705" text-anchor="middle" font-size="12.5" font-weight="700" fill="#00594E">AI 서버 (RAG · OCR)</text>
  <text x="1570" y="726" text-anchor="middle" font-size="12" fill="#00695C">Python · FastAPI · :8000</text>
  <text x="1570" y="745" text-anchor="middle" font-size="12" fill="#00695C">임베딩: ko-sroberta-multitask</text>
  <text x="1570" y="764" text-anchor="middle" font-size="12" fill="#00695C">재정렬: ko-reranker</text>
  <text x="1570" y="783" text-anchor="middle" font-size="12" fill="#00695C">벡터DB: ChromaDB(volume)</text>
  <text x="1570" y="802" text-anchor="middle" font-size="12" fill="#00695C">OCR: Tesseract(kor+eng)</text>
  <text x="1570" y="821" text-anchor="middle" font-size="12" fill="#00695C">/index · /recommend · /ocr</text>
  <text x="1570" y="843" text-anchor="middle" font-size="10.5" fill="#0F9188">image: pickard-rag:local</text>
  <text x="1570" y="860" text-anchor="middle" font-size="10.5" fill="#0F9188">volumes: chroma-data, uploads-data</text>

  <!-- Uploads shared note -->
  <text x="150" y="945" font-size="12" fill="#607D8B">※ 업로드 파일(신분증 등)은 서버 2대 &amp; RAG 컨테이너가 볼륨/바인드마운트로 공유 (uploads-data)</text>

  <!-- RAG -> external LLM APIs (outside docker boundary) -->
  <path d="M 1740 770 L 1778 770" stroke="#8E24AA" stroke-width="2" fill="none" marker-end="url(#arrowPurple)"/>
  <text x="1875" y="645" text-anchor="middle" font-size="12" font-weight="700" fill="#8E24AA">외부 LLM API</text>
  <text x="1875" y="660" text-anchor="middle" font-size="10.5" fill="#8E24AA">(답변 생성 · Generation)</text>

  <rect x="1780" y="672" width="190" height="62" rx="8" fill="#FFFFFF" stroke="#8E24AA" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1875" y="696" text-anchor="middle" font-size="13" font-weight="700" fill="#6A1B9A">Groq</text>
  <text x="1875" y="713" text-anchor="middle" font-size="10.5" fill="#8E24AA">Llama 3.3 70B (기본값)</text>
  <text x="1875" y="727" text-anchor="middle" font-size="9.5" fill="#8E24AA">groq SDK</text>

  <rect x="1780" y="746" width="190" height="62" rx="8" fill="#FFFFFF" stroke="#8E24AA" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1875" y="770" text-anchor="middle" font-size="13" font-weight="700" fill="#6A1B9A">Google Gemini</text>
  <text x="1875" y="787" text-anchor="middle" font-size="10.5" fill="#8E24AA">2.0 Flash</text>
  <text x="1875" y="801" text-anchor="middle" font-size="9.5" fill="#8E24AA">google-genai SDK</text>

  <rect x="1780" y="820" width="190" height="62" rx="8" fill="#FFFFFF" stroke="#8E24AA" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1875" y="844" text-anchor="middle" font-size="13" font-weight="700" fill="#6A1B9A">Anthropic Claude</text>
  <text x="1875" y="861" text-anchor="middle" font-size="10.5" fill="#8E24AA">Opus 4.x</text>
  <text x="1875" y="875" text-anchor="middle" font-size="9.5" fill="#8E24AA">anthropic SDK</text>

  <!-- ===================== Tech stack footer ===================== -->
  <text x="65" y="1050" font-size="19" font-weight="700" fill="#1A237E">기술 스택</text>

