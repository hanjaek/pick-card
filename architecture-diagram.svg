<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1250" viewBox="0 0 1800 1250" font-family="'Apple SD Gothic Neo','Malgun Gothic','Pretendard',sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#546E7A"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1565C0"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8E24AA"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1800" height="1250" fill="#FAFBFC"/>

  <!-- Title -->
  <text x="900" y="55" text-anchor="middle" font-size="34" font-weight="700" fill="#1A237E">BNK Pickard 서비스 아키텍처</text>
  <text x="900" y="85" text-anchor="middle" font-size="16" fill="#607D8B">Docker 컨테이너 분리 · WAS 이중화 · RAG 기반 AI 카드 추천</text>

  <!-- Client (left) -->
  <rect x="90" y="615" width="240" height="70" rx="10" fill="#FFFFFF" stroke="#90A4AE" stroke-width="2" filter="url(#shadow)"/>
  <text x="210" y="645" text-anchor="middle" font-size="17" font-weight="700" fill="#37474F">사용자 브라우저</text>
  <text x="210" y="668" text-anchor="middle" font-size="12.5" fill="#607D8B">React SPA</text>

  <line x1="330" y1="650" x2="388" y2="650" stroke="#546E7A" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Docker boundary -->
  <rect x="392" y="170" width="1058" height="980" rx="16" fill="#F3F9FF" stroke="#2496ED" stroke-width="2.5" stroke-dasharray="10,6"/>
  <text x="416" y="205" font-size="19" font-weight="700" fill="#2496ED">🐳 Docker — 서비스별 컨테이너 완전 분리</text>

  <!-- Nginx -->
  <rect x="460" y="600" width="240" height="100" rx="10" fill="#E8F6FD" stroke="#29B6F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="580" y="632" text-anchor="middle" font-size="16" font-weight="700" fill="#01579B">Nginx</text>
  <text x="580" y="654" text-anchor="middle" font-size="12.5" fill="#0277BD">단일 진입점 · 로드밸런싱</text>
  <text x="580" y="674" text-anchor="middle" font-size="11" fill="#0288D1">:3000</text>

  <!-- Nginx -> WAS split (up/down) -->
  <path d="M 700 615 L 758 320" stroke="#1565C0" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M 700 685 L 758 980" stroke="#1565C0" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>

  <!-- WAS #1 (top) -->
  <rect x="760" y="250" width="280" height="130" rx="10" fill="#EAF7EE" stroke="#68A063" stroke-width="2" filter="url(#shadow)"/>
  <text x="900" y="282" text-anchor="middle" font-size="16" font-weight="700" fill="#2E5D34">WAS 서버 #1</text>
  <text x="900" y="306" text-anchor="middle" font-size="13" fill="#3C6E42">Node.js + Express</text>
  <text x="900" y="328" text-anchor="middle" font-size="13" fill="#3C6E42">로그인 · 카드 · 신청 API</text>
  <text x="900" y="352" text-anchor="middle" font-size="11.5" fill="#4E7C54">2대 이중화 — 한 대 죽어도 무중단</text>

  <!-- WAS #2 (bottom) -->
  <rect x="760" y="930" width="280" height="130" rx="10" fill="#EAF7EE" stroke="#68A063" stroke-width="2" filter="url(#shadow)"/>
  <text x="900" y="962" text-anchor="middle" font-size="16" font-weight="700" fill="#2E5D34">WAS 서버 #2</text>
  <text x="900" y="986" text-anchor="middle" font-size="13" fill="#3C6E42">Node.js + Express</text>
  <text x="900" y="1008" text-anchor="middle" font-size="13" fill="#3C6E42">로그인 · 카드 · 신청 API</text>
  <text x="900" y="1032" text-anchor="middle" font-size="11.5" fill="#4E7C54">동일 이미지로 수평 확장</text>

  <!-- WAS -> data column arrows -->
  <path d="M 1000 380 L 1078 455" stroke="#546E7A" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 1040 360 L 1078 615" stroke="#546E7A" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 1040 950 L 1078 690" stroke="#546E7A" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 1000 930 L 1078 850" stroke="#546E7A" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- MySQL -->
  <rect x="1080" y="390" width="300" height="140" rx="10" fill="#FFF3E0" stroke="#EF6C00" stroke-width="2" filter="url(#shadow)"/>
  <text x="1230" y="424" text-anchor="middle" font-size="16" font-weight="700" fill="#8A4B00">MySQL</text>
  <text x="1230" y="450" text-anchor="middle" font-size="13" fill="#A15A00">회원 · 카드 · 신청 데이터</text>
  <text x="1230" y="470" text-anchor="middle" font-size="13" fill="#A15A00">영구 저장(RDB)</text>
  <text x="1230" y="496" text-anchor="middle" font-size="11" fill="#B06A10">volume 으로 데이터 보존</text>

  <!-- Redis -->
  <rect x="1080" y="550" width="300" height="200" rx="10" fill="#FDEDED" stroke="#DC382D" stroke-width="2" filter="url(#shadow)"/>
  <text x="1230" y="584" text-anchor="middle" font-size="16" font-weight="700" fill="#A32017">Redis</text>
  <text x="1230" y="606" text-anchor="middle" font-size="12" fill="#A32017">(세션 · 캐시)</text>
  <text x="1230" y="632" text-anchor="middle" font-size="12.5" fill="#B5463C">서버 2대의 로그인</text>
  <text x="1230" y="652" text-anchor="middle" font-size="12.5" fill="#B5463C">세션 공유</text>
  <text x="1230" y="676" text-anchor="middle" font-size="12.5" fill="#B5463C">Master-Replica + Sentinel</text>
  <text x="1230" y="700" text-anchor="middle" font-size="11" fill="#C25A50">장애 시 자동 승격(Failover)</text>
  <text x="1230" y="722" text-anchor="middle" font-size="11" fill="#C25A50">이중화</text>

  <!-- AI / RAG / OCR -->
  <rect x="1080" y="770" width="300" height="140" rx="10" fill="#E0F2F1" stroke="#00897B" stroke-width="2" filter="url(#shadow)"/>
  <text x="1230" y="804" text-anchor="middle" font-size="16" font-weight="700" fill="#00594E">AI 서버</text>
  <text x="1230" y="826" text-anchor="middle" font-size="12" fill="#00594E">(RAG · OCR)</text>
  <text x="1230" y="850" text-anchor="middle" font-size="12.5" fill="#00695C">벡터 검색 기반 카드 추천</text>
  <text x="1230" y="870" text-anchor="middle" font-size="12.5" fill="#00695C">신분증 OCR 자동 인식</text>
  <text x="1230" y="894" text-anchor="middle" font-size="11" fill="#0F9188">Python · FastAPI</text>

  <!-- AI -> external -->
  <path d="M 1380 840 L 1428 840" stroke="#8E24AA" stroke-width="2.5" fill="none" marker-end="url(#arrowPurple)"/>

  <!-- External LLM (outside boundary) -->
  <rect x="1436" y="762" width="160" height="156" rx="10" fill="#F9F1FB" stroke="#8E24AA" stroke-width="2" stroke-dasharray="6,4" filter="url(#shadow)"/>
  <text x="1516" y="794" text-anchor="middle" font-size="15" font-weight="700" fill="#6A1B9A">외부 LLM</text>
  <text x="1516" y="820" text-anchor="middle" font-size="13" fill="#8E24AA">Groq</text>
  <text x="1516" y="842" text-anchor="middle" font-size="13" fill="#8E24AA">Gemini</text>
  <text x="1516" y="864" text-anchor="middle" font-size="13" fill="#8E24AA">Claude</text>
  <text x="1516" y="890" text-anchor="middle" font-size="11" fill="#9C4DBB">답변 생성</text>

  <!-- RAG pipeline caption (inside boundary) -->
  <rect x="460" y="1085" width="920" height="46" rx="8" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="1.3"/>
  <text x="920" y="1113" text-anchor="middle" font-size="13.5" fill="#37474F">RAG 파이프라인&#160; &#160;질문 임베딩 → 벡터 검색(카드 DB) → 재정렬(Re-rank) → LLM이 추천 답변 생성</text>

  <!-- Note below boundary -->
  <text x="900" y="1185" text-anchor="middle" font-size="14" fill="#37474F">각 컨테이너는 독립적으로 배포되며, 장애 시 자동 재기동(healthcheck)</text>
  <text x="900" y="1210" text-anchor="middle" font-size="14" fill="#37474F">Redis Sentinel 로 세션 유실 없이 자동 장애조치(Failover)</text>

</svg>
