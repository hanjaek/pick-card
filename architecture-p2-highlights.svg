<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1150" viewBox="0 0 1800 1150" font-family="'Apple SD Gothic Neo','Malgun Gothic','Pretendard',sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#607D8B"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8E24AA"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1800" height="1150" fill="#FAFBFC"/>

  <!-- Title -->
  <text x="900" y="50" text-anchor="middle" font-size="30" font-weight="700" fill="#1A237E">BNK Pickard 서비스 아키텍처 — 기술 강조 포인트</text>
  <text x="900" y="78" text-anchor="middle" font-size="14.5" fill="#607D8B">① Docker 분리 &#160;&#160;② WAS 이중화 &#160;&#160;③ Redis 자동 Failover &#160;&#160;④ RAG 추천 파이프라인</text>

  <!-- Client -->
  <rect x="90" y="465" width="240" height="90" rx="14" fill="#FFFFFF" stroke="#90A4AE" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="90" y="465" width="240" height="34" rx="14" fill="#78909C"/>
  <rect x="90" y="481" width="240" height="18" fill="#78909C"/>
  <text x="210" y="488" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">🧑‍💻 사용자 브라우저 (React)</text>
  <text x="210" y="530" text-anchor="middle" font-size="13" fill="#546E7A">웹 브라우저로 접속</text>

  <line x1="330" y1="510" x2="386" y2="510" stroke="#607D8B" stroke-width="2.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <!-- Docker boundary -->
  <rect x="392" y="200" width="1038" height="600" rx="18" fill="#F3F9FF" stroke="#2496ED" stroke-width="2.5" stroke-dasharray="9,6"/>
  <circle cx="414" cy="227" r="15" fill="#F57C00"/>
  <text x="414" y="232" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">①</text>
  <text x="438" y="233" font-size="18" font-weight="700" fill="#2496ED">🐳 Docker — 서비스별 컨테이너 완전 분리</text>

  <!-- Nginx -->
  <rect x="460" y="465" width="240" height="90" rx="14" fill="#FFFFFF" stroke="#29B6F6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="460" y="465" width="240" height="34" rx="14" fill="#29B6F6"/>
  <rect x="460" y="481" width="240" height="18" fill="#29B6F6"/>
  <text x="580" y="488" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">🌐 웹 서버 (Nginx)</text>
  <text x="580" y="530" text-anchor="middle" font-size="13" fill="#0277BD">단일 진입점 · 로드밸런싱 · :3000</text>

  <!-- Bus 1: Nginx -> WAS#1 / WAS#2 -->
  <path d="M 700 510 L 730 510" stroke="#1565C0" stroke-width="2.5" fill="none"/>
  <path d="M 730 330 L 730 690" stroke="#1565C0" stroke-width="2.5" fill="none"/>
  <path d="M 730 330 L 758 330" stroke="#1565C0" stroke-width="2.5" fill="none" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <path d="M 730 690 L 758 690" stroke="#1565C0" stroke-width="2.5" fill="none" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <circle cx="730" cy="510" r="4" fill="#1565C0"/>

  <!-- WAS #1 (top) -->
  <rect x="760" y="260" width="290" height="140" rx="14" fill="#FFFFFF" stroke="#68A063" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="760" y="260" width="290" height="36" rx="14" fill="#68A063"/>
  <rect x="760" y="278" width="290" height="18" fill="#68A063"/>
  <circle cx="786" cy="278" r="14" fill="#F57C00"/>
  <text x="786" y="283" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">②</text>
  <text x="920" y="284" text-anchor="middle" font-size="13.5" font-weight="700" fill="#FFFFFF">🖥️ WAS 서버 #1 (Node.js)</text>
  <text x="905" y="330" text-anchor="middle" font-size="13" fill="#3C6E42">로그인 · 카드 · 신청 API 처리</text>
  <rect x="790" y="350" width="230" height="32" rx="16" fill="#FFF3E0"/>
  <text x="905" y="371" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">⚡ 1대 다운돼도 무중단</text>

  <!-- WAS #2 (bottom) -->
  <rect x="760" y="620" width="290" height="140" rx="14" fill="#FFFFFF" stroke="#68A063" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="760" y="620" width="290" height="36" rx="14" fill="#68A063"/>
  <rect x="760" y="638" width="290" height="18" fill="#68A063"/>
  <circle cx="786" cy="638" r="14" fill="#F57C00"/>
  <text x="786" y="643" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">②</text>
  <text x="920" y="644" text-anchor="middle" font-size="13.5" font-weight="700" fill="#FFFFFF">🖥️ WAS 서버 #2 (Node.js)</text>
  <text x="905" y="690" text-anchor="middle" font-size="13" fill="#3C6E42">동일 이미지로 수평 확장</text>
  <rect x="790" y="710" width="230" height="32" rx="16" fill="#FFF3E0"/>
  <text x="905" y="731" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">⚡ 1대 다운돼도 무중단</text>

  <!-- Bus 2: WAS#1/#2 -> data column -->
  <path d="M 1050 330 L 1060 330" stroke="#607D8B" stroke-width="2.5" fill="none"/>
  <path d="M 1050 690 L 1060 690" stroke="#607D8B" stroke-width="2.5" fill="none"/>
  <path d="M 1060 330 L 1060 690" stroke="#607D8B" stroke-width="2.5" fill="none"/>
  <path d="M 1060 350 L 1088 350" stroke="#607D8B" stroke-width="2.5" fill="none" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <path d="M 1060 490 L 1088 490" stroke="#607D8B" stroke-width="2.5" fill="none" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <path d="M 1060 650 L 1088 650" stroke="#607D8B" stroke-width="2.5" fill="none" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <circle cx="1060" cy="330" r="4" fill="#607D8B"/>
  <circle cx="1060" cy="690" r="4" fill="#607D8B"/>
  <circle cx="1060" cy="350" r="4" fill="#607D8B"/>
  <circle cx="1060" cy="490" r="4" fill="#607D8B"/>
  <circle cx="1060" cy="650" r="4" fill="#607D8B"/>

  <!-- MySQL -->
  <rect x="1090" y="300" width="300" height="100" rx="14" fill="#FFFFFF" stroke="#EF6C00" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="1090" y="300" width="300" height="32" rx="14" fill="#EF6C00"/>
  <rect x="1090" y="314" width="300" height="18" fill="#EF6C00"/>
  <text x="1240" y="321" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">🗄️ 데이터베이스 (MySQL)</text>
  <text x="1240" y="356" text-anchor="middle" font-size="13" fill="#A15A00">회원 · 카드 · 신청 데이터</text>
  <text x="1240" y="378" text-anchor="middle" font-size="12" fill="#B06A10">volume 으로 영속 저장</text>

  <!-- Redis -->
  <rect x="1090" y="420" width="300" height="140" rx="14" fill="#FFFFFF" stroke="#DC382D" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="1090" y="420" width="300" height="36" rx="14" fill="#DC382D"/>
  <rect x="1090" y="438" width="300" height="18" fill="#DC382D"/>
  <circle cx="1116" cy="438" r="14" fill="#F57C00"/>
  <text x="1116" y="443" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">③</text>
  <text x="1255" y="444" text-anchor="middle" font-size="13.5" font-weight="700" fill="#FFFFFF">💾 세션·캐시 저장소 (Redis)</text>
  <text x="1240" y="478" text-anchor="middle" font-size="12.5" fill="#B5463C">Master - Replica + Sentinel</text>
  <text x="1240" y="499" text-anchor="middle" font-size="12" fill="#B5463C">서버 2대 로그인 세션 공유</text>
  <rect x="1120" y="510" width="240" height="32" rx="16" fill="#FFF3E0"/>
  <text x="1240" y="531" text-anchor="middle" font-size="12.5" font-weight="700" fill="#E65100">🔄 자동 Failover · 세션유실 ZERO</text>

  <!-- AI / RAG / OCR -->
  <rect x="1090" y="580" width="300" height="140" rx="14" fill="#FFFFFF" stroke="#00897B" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="1090" y="580" width="300" height="36" rx="14" fill="#00897B"/>
  <rect x="1090" y="598" width="300" height="18" fill="#00897B"/>
  <circle cx="1116" cy="598" r="14" fill="#F57C00"/>
  <text x="1116" y="603" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">④</text>
  <text x="1250" y="604" text-anchor="middle" font-size="13.5" font-weight="700" fill="#FFFFFF">🤖 AI 추천 서버 (FastAPI)</text>
  <text x="1240" y="642" text-anchor="middle" font-size="12.5" fill="#00695C">RAG 카드 추천 · 신분증 OCR 인식</text>
  <rect x="1120" y="656" width="240" height="32" rx="16" fill="#FFF3E0"/>
  <text x="1240" y="677" text-anchor="middle" font-size="12" font-weight="700" fill="#E65100">🎯 임베딩→검색→재정렬→생성</text>

  <!-- AI -> external -->
  <path d="M 1390 650 L 1428 650" stroke="#8E24AA" stroke-width="2.5" fill="none" marker-start="url(#arrowPurple)" marker-end="url(#arrowPurple)"/>

  <!-- External LLM (outside boundary) -->
  <rect x="1436" y="580" width="170" height="140" rx="14" fill="#FFFFFF" stroke="#8E24AA" stroke-width="1.5" stroke-dasharray="5,4" filter="url(#shadow)"/>
  <rect x="1436" y="580" width="170" height="34" rx="14" fill="#8E24AA"/>
  <rect x="1436" y="596" width="170" height="18" fill="#8E24AA"/>
  <text x="1521" y="603" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFFFFF">☁️ 외부 AI (LLM)</text>
  <text x="1521" y="642" text-anchor="middle" font-size="12.5" fill="#8E24AA">Groq · Gemini</text>
  <text x="1521" y="664" text-anchor="middle" font-size="12.5" fill="#8E24AA">Claude</text>
  <text x="1521" y="694" text-anchor="middle" font-size="11" fill="#9C4DBB">선택 연동 · 답변 생성</text>

  <!-- RAG pipeline caption (below boundary) -->
  <rect x="460" y="828" width="920" height="46" rx="10" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="1.3"/>
  <text x="920" y="856" text-anchor="middle" font-size="13.5" fill="#37474F">④ RAG 파이프라인&#160; &#160;질문 임베딩 → 벡터 검색(카드 DB) → 재정렬(Re-rank) → LLM이 추천 답변 생성</text>

  <!-- ===================== Highlight summary cards ===================== -->
  <text x="60" y="928" font-size="20" font-weight="700" fill="#1A237E">핵심 기술 포인트</text>

  <rect x="40" y="946" width="410" height="150" rx="10" fill="#FFFFFF" stroke="#2496ED" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="946" width="410" height="38" rx="10" fill="#2496ED"/>
  <rect x="40" y="964" width="410" height="20" fill="#2496ED"/>
  <circle cx="66" cy="965" r="13" fill="#F57C00"/>
  <text x="66" y="970" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFFFFF">①</text>
  <text x="245" y="971" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">🐳 Docker 컨테이너 분리</text>
  <text x="60" y="1014" font-size="13" fill="#37474F">서비스별 독립 배포, 장애 영향 최소화</text>
  <text x="60" y="1038" font-size="13" fill="#37474F">healthcheck로 다운 시 자동 재기동</text>
  <text x="60" y="1066" font-size="11.5" fill="#78909C">frontend · WAS×2 · DB · Redis · AI 모두 별도 컨테이너</text>

  <rect x="470" y="946" width="410" height="150" rx="10" fill="#FFFFFF" stroke="#68A063" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="470" y="946" width="410" height="38" rx="10" fill="#68A063"/>
  <rect x="470" y="964" width="410" height="20" fill="#68A063"/>
  <circle cx="496" cy="965" r="13" fill="#F57C00"/>
  <text x="496" y="970" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFFFFF">②</text>
  <text x="680" y="971" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">⚡ WAS 이중화</text>
  <text x="490" y="1014" font-size="13" fill="#37474F">Nginx 로드밸런싱으로 요청 분산</text>
  <text x="490" y="1038" font-size="13" fill="#37474F">서버 1대가 죽어도 무중단 서비스</text>
  <text x="490" y="1066" font-size="11.5" fill="#78909C">동일 이미지로 수평 확장 가능한 구조</text>

  <rect x="900" y="946" width="410" height="150" rx="10" fill="#FFFFFF" stroke="#DC382D" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="900" y="946" width="410" height="38" rx="10" fill="#DC382D"/>
  <rect x="900" y="964" width="410" height="20" fill="#DC382D"/>
  <circle cx="926" cy="965" r="13" fill="#F57C00"/>
  <text x="926" y="970" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFFFFF">③</text>
  <text x="1110" y="971" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">🔄 Redis 자동 Failover</text>
  <text x="920" y="1014" font-size="13" fill="#37474F">Master 장애 시 Sentinel이 자동 승격</text>
  <text x="920" y="1038" font-size="13" fill="#37474F">로그인 세션 유실 없이 즉시 복구</text>
  <text x="920" y="1066" font-size="11.5" fill="#78909C">Sentinel 3대(쿼럼 2) 로 안정적 장애 판단</text>

  <rect x="1330" y="946" width="410" height="150" rx="10" fill="#FFFFFF" stroke="#00897B" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="1330" y="946" width="410" height="38" rx="10" fill="#00897B"/>
  <rect x="1330" y="964" width="410" height="20" fill="#00897B"/>
  <circle cx="1356" cy="965" r="13" fill="#F57C00"/>
  <text x="1356" y="970" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFFFFF">④</text>
  <text x="1540" y="971" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">🎯 RAG 추천 파이프라인</text>
  <text x="1350" y="1014" font-size="13" fill="#37474F">임베딩 → 벡터검색 → 재정렬 → LLM 생성</text>
  <text x="1350" y="1038" font-size="13" fill="#37474F">카드 데이터 기반 맞춤 추천 제공</text>
  <text x="1350" y="1066" font-size="11.5" fill="#78909C">Groq · Gemini · Claude 중 선택 연동</text>

</svg>
