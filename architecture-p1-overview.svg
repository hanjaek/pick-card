<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="950" viewBox="0 0 1800 950" font-family="'Apple SD Gothic Neo','Malgun Gothic','Pretendard',sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#546E7A"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1800" height="950" fill="#FAFBFC"/>

  <!-- Title -->
  <text x="900" y="72" text-anchor="middle" font-size="38" font-weight="700" fill="#1A237E">BNK Pickard 서비스 아키텍처</text>
  <text x="900" y="108" text-anchor="middle" font-size="18" fill="#607D8B">한눈에 보는 전체 구조</text>

  <!-- Docker grouping boundary -->
  <rect x="415" y="185" width="1305" height="345" rx="18" fill="#F3F9FF" stroke="#2496ED" stroke-width="2.5" stroke-dasharray="10,6"/>
  <text x="450" y="222" font-size="16" font-weight="700" fill="#2496ED">🐳 Docker로 서비스별 분리 운영</text>

  <!-- 1. User -->
  <rect x="110" y="230" width="260" height="270" rx="14" fill="#FFFFFF" stroke="#90A4AE" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="240" y="330" text-anchor="middle" font-size="56">🧑‍💻</text>
  <text x="240" y="395" text-anchor="middle" font-size="21" font-weight="700" fill="#37474F">사용자</text>
  <text x="240" y="424" text-anchor="middle" font-size="14.5" fill="#78909C">웹 브라우저로 접속</text>

  <line x1="370" y1="365" x2="428" y2="365" stroke="#546E7A" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 2. Web Server -->
  <rect x="440" y="250" width="260" height="270" rx="14" fill="#E8F6FD" stroke="#29B6F6" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="570" y="350" text-anchor="middle" font-size="56">🌐</text>
  <text x="570" y="415" text-anchor="middle" font-size="21" font-weight="700" fill="#01579B">웹 서버</text>
  <text x="570" y="444" text-anchor="middle" font-size="14.5" fill="#0277BD">요청을 받는 진입점</text>

  <line x1="700" y1="385" x2="758" y2="385" stroke="#546E7A" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 3. Backend -->
  <rect x="770" y="250" width="260" height="270" rx="14" fill="#EAF7EE" stroke="#68A063" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="900" y="350" text-anchor="middle" font-size="56">🖥️</text>
  <text x="900" y="415" text-anchor="middle" font-size="21" font-weight="700" fill="#2E5D34">백엔드 서버</text>
  <text x="900" y="444" text-anchor="middle" font-size="14.5" fill="#3C6E42">핵심 기능 처리 (2대 운영)</text>

  <line x1="1030" y1="385" x2="1088" y2="385" stroke="#546E7A" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 4. Data storage -->
  <rect x="1100" y="250" width="260" height="270" rx="14" fill="#FFF3E0" stroke="#EF6C00" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="1230" y="350" text-anchor="middle" font-size="56">🗄️</text>
  <text x="1230" y="415" text-anchor="middle" font-size="21" font-weight="700" fill="#8A4B00">데이터 저장소</text>
  <text x="1230" y="444" text-anchor="middle" font-size="14.5" fill="#A15A00">회원 · 카드 정보 보관</text>

  <line x1="1360" y1="385" x2="1418" y2="385" stroke="#546E7A" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 5. AI recommend -->
  <rect x="1430" y="230" width="260" height="270" rx="14" fill="#E0F2F1" stroke="#00897B" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="1560" y="330" text-anchor="middle" font-size="56">🤖</text>
  <text x="1560" y="395" text-anchor="middle" font-size="21" font-weight="700" fill="#00594E">AI 추천 서버</text>
  <text x="1560" y="424" text-anchor="middle" font-size="14.5" fill="#00695C">질문에 맞는 카드 추천</text>

  <!-- Bottom simple caption -->
  <text x="900" y="590" text-anchor="middle" font-size="18" fill="#455A64">사용자의 질문 → AI가 딱 맞는 카드를 찾아서 추천해주는 서비스</text>

  <!-- 3 simple footer badges -->
  <rect x="230" y="650" width="440" height="130" rx="65" fill="#FFFFFF" stroke="#68A063" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="450" y="708" text-anchor="middle" font-size="19" font-weight="700" fill="#2E5D34">⚡ 서버가 죽어도 안 멈춰요</text>
  <text x="450" y="738" text-anchor="middle" font-size="14.5" fill="#4E7C54">2대 이중화 + 자동 복구</text>

  <rect x="680" y="650" width="440" height="130" rx="65" fill="#FFFFFF" stroke="#00897B" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="900" y="708" text-anchor="middle" font-size="19" font-weight="700" fill="#00594E">🎯 AI가 맞춤 카드를 추천해요</text>
  <text x="900" y="738" text-anchor="middle" font-size="14.5" fill="#00695C">RAG 기반 추천 엔진</text>

  <rect x="1130" y="650" width="440" height="130" rx="65" fill="#FFFFFF" stroke="#2496ED" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="1350" y="708" text-anchor="middle" font-size="19" font-weight="700" fill="#01579B">🐳 서비스마다 독립적으로 운영</text>
  <text x="1350" y="738" text-anchor="middle" font-size="14.5" fill="#0277BD">Docker 컨테이너 구조</text>

</svg>
