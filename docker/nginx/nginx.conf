# ============================================================
#  nginx 로드밸런서 — 백엔드 서버 2대 앞단
#  - server-1 / server-2 로 요청 분배 (라운드로빈)
#  - 한 대가 죽으면 자동으로 살아있는 쪽으로만 보냄 (무중단)
# ============================================================

events {}

http {
  # 백엔드 서버 풀 (도커 네트워크 내부 이름:포트)
  upstream pickard_backend {
    server pickard-server-1:4000 max_fails=1 fail_timeout=3s;
    server pickard-server-2:4000 max_fails=1 fail_timeout=3s;
  }

  server {
    listen 4000;

    location / {
      proxy_pass http://pickard_backend;

      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # 죽은 서버에 걸리면 즉시 다음 서버로 재시도 (무중단 핵심)
      proxy_next_upstream error timeout http_502 http_503 http_504;
      proxy_connect_timeout 2s;
    }
  }
}
