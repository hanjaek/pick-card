# ================================================================
#  BNK Pickard — Redis Master / Replica / Sentinel
#  로컬 도커 클러스터 (클라우드 없이 페일오버 구조 시연)
#
#  실행:  docker compose up -d
#  종료:  docker compose down
#  로그:  docker compose logs -f
#
#  [고정 IP 사용 이유]
#  Sentinel 이 컨테이너 "이름"(redis-master)으로 감시하면, 마스터가 죽었을 때
#  그 이름이 DNS 에서 사라지고 → Sentinel 의 이름 조회가 멈춰(블로킹) → tilt mode
#  로 빠져 페일오버가 안 끝난다. 그래서 각 노드에 고정 IP 를 박고 IP 로 감시한다.
# ================================================================

networks:
  redis-cluster:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  master-data:       # 마스터 AOF / RDB 영속 저장
  replica-data:      # 레플리카 AOF 영속 저장
  sentinel-data:     # 센티넬이 런타임에 설정을 기록할 쓰기 가능 공간
  redisinsight-data: # RedisInsight(시각화 GUI) 설정 저장

services:

  # ── 1. MASTER (172.28.0.10) ────────────────────────────────────
  #    모든 쓰기(SET, DEL …)의 출처 · 원본 장부
  redis-master:
    image: redis:7-alpine
    container_name: redis-master
    ports:
      - "6379:6379"          # 호스트에서 직접 접속 가능
    volumes:
      - ./redis/master.conf:/usr/local/etc/redis/redis.conf:ro
      - master-data:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      redis-cluster:
        ipv4_address: 172.28.0.10
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── 2. REPLICA (172.28.0.11) ───────────────────────────────────
  #    마스터 데이터 실시간 복제 · 읽기 전용 부하 분산
  #    마스터 장애 시 센티넬의 지시로 새 마스터로 승격
  redis-replica:
    image: redis:7-alpine
    container_name: redis-replica
    ports:
      - "6380:6379"          # 레플리카는 6380 으로 노출
    volumes:
      - ./redis/replica.conf:/usr/local/etc/redis/redis.conf:ro
      - replica-data:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      redis-cluster:
        ipv4_address: 172.28.0.11
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── 3. SENTINEL (172.28.0.12) ──────────────────────────────────
  #    마스터 감시 · 페일오버 지휘관
  #    마스터가 down-after-milliseconds 동안 응답 없으면
  #    레플리카를 새 마스터로 승격 (Failover)
  redis-sentinel:
    image: redis:7-alpine
    container_name: redis-sentinel
    ports:
      - "26379:26379"
    volumes:
      # 원본 설정은 읽기 전용으로 마운트
      - ./redis/sentinel.conf:/etc/redis/sentinel.conf:ro
      # Sentinel이 런타임에 설정을 기록할 쓰기 가능 공간
      - sentinel-data:/data
    # Sentinel은 실행 중 설정파일을 직접 수정함(페일오버 후 새 마스터 기록).
    # 윈도우 마운트 파일은 쓰기 불가 → 쓰기 가능한 /data로 복사 후 실행.
    command: sh -c "cp /etc/redis/sentinel.conf /data/sentinel.conf && redis-server /data/sentinel.conf --sentinel"
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    networks:
      redis-cluster:
        ipv4_address: 172.28.0.12
    restart: unless-stopped

  # ── 4. REDISINSIGHT (172.28.0.13 · 시각화 GUI) ────────────────
  #    브라우저에서 Redis 안의 키·값을 눈으로 확인하는 도구.
  #    발표 시 "세션이 Redis에 저장된다"를 시각적으로 보여주기 좋음.
  #    접속: http://localhost:5540  (DB 연결 시 host = 172.28.0.10)
  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    ports:
      - "5540:5540"
    volumes:
      - redisinsight-data:/data
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      redis-cluster:
        ipv4_address: 172.28.0.13
    restart: unless-stopped
