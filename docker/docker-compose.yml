# ================================================================
#  BNK Pickard — 전체 컨테이너 스택 (모든 구성요소 컨테이너화)
#
#  [ frontend(nginx) ] → [ server-1 / server-2 ] → [ Redis(master/replica/sentinel) ]
#       localhost:3000                            → [ MySQL ]
#
#  - frontend: React 정적 빌드 서빙 + /api 를 서버 2대로 로드밸런싱 (단일 진입점)
#  - 서버 2대 → 한 대 죽어도 무중단 (세션은 Redis 공유)
#  - Redis 마스터/레플리카/센티넬 → 캐시·세션 저장 + 자동 페일오버
#  - MySQL → schema.sql 자동 시드
#  - 모든 컨테이너 restart: unless-stopped → 죽으면 자동 재기동
#
#  실행:  docker compose up -d --build
#  접속:  http://localhost:3000
#  종료:  docker compose down
# ================================================================

networks:
  redis-cluster:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  master-data:
  replica-data:
  sentinel-data:
  sentinel2-data:
  sentinel3-data:
  mysql-data:
  uploads-data:      # 약관 PDF 등 업로드 파일 — 서버 2대가 공유
  # redisinsight 는 호스트 폴더(bind mount)로 분리 → down -v 해도 연결 설정 유지
  chroma-data:

# 백엔드 서버 2대 공통 설정 (YAML 앵커로 중복 제거)
x-server-common: &server-common
  build:
    context: ../prototype/server
  image: pickard-server:local
  volumes:
    - uploads-data:/app/uploads   # 업로드 파일 공유 (서버 2대 동일 파일 접근)
  env_file:
    - ./.env                 # 비밀값(DB_PASSWORD·JWT_SECRET·SESSION_SECRET) 분리
  environment:
    PORT:              "4000"
    DB_HOST:           mysql
    DB_PORT:           "3306"
    DB_USER:           root
    DB_NAME:           bnk_card
    RAG_URL:           "http://pickard-rag:8000"
    # 센티넬 3대 모두 등록 → 일부 죽어도 마스터 자동 추적
    REDIS_SENTINELS:   redis-sentinel:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
    REDIS_MASTER_NAME: mymaster
  depends_on:
    redis-master:
      condition: service_healthy
    redis-sentinel:
      condition: service_started
    mysql:
      condition: service_healthy
  # 헬스체크: /api/health 200 이어야 healthy (좀비 서버 감지)
  healthcheck:
    test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
    interval: 10s
    timeout: 5s
    retries: 3
    start_period: 20s
  networks:
    - redis-cluster
  restart: unless-stopped

services:

  # ── MySQL (172.28.0.20) ────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: pickard-mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    env_file:
      - ./.env                 # MYSQL_ROOT_PASSWORD (비밀값 분리)
    environment:
      MYSQL_DATABASE: bnk_card
    volumes:
      - mysql-data:/var/lib/mysql
      # 최초 기동 시 스키마+시드 자동 실행
      - ../prototype/server/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      redis-cluster:
        ipv4_address: 172.28.0.20
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # ── 백엔드 서버 2대 ─────────────────────────────────────────────
  pickard-server-1:
    <<: *server-common
    container_name: pickard-server-1

  pickard-server-2:
    <<: *server-common
    container_name: pickard-server-2

  # ── 프론트엔드 + nginx (단일 진입점, 호스트 3000) ───────────────
  #    React 정적 빌드 서빙 + /api 를 서버 2대로 로드밸런싱
  frontend:
    build:
      context: ../prototype/client
    image: pickard-frontend:local
    container_name: pickard-frontend
    ports:
      - "3000:80"            # 호스트 3000 → nginx(80) → React + /api 분배
    depends_on:
      - pickard-server-1
      - pickard-server-2
    networks:
      - redis-cluster
    restart: unless-stopped

  # ── 파이썬 AI 서버 (RAG & OCR) ──────────────────────────────────
  pickard-rag:
    build:
      context: ../rag-service
    image: pickard-rag:local
    container_name: pickard-rag
    ports:
      - "8000:8000"
    env_file:
      - ../rag-service/.env  # GROQ_API_KEY, ANTHROPIC_API_KEY, GOOGLE_API_KEY 등
    environment:
      # AI 서버가 카드를 인덱싱할 때 프론트엔드 Nginx(로드밸런서)를 통해 백엔드에 요청하도록 설정
      BACKEND_URL: "http://frontend:80"
    volumes:
      - chroma-data:/app/chroma_db
      - uploads-data:/app/uploads
    depends_on:
      - frontend
    networks:
      - redis-cluster
    restart: unless-stopped

  # ── Redis MASTER (172.28.0.10) ─────────────────────────────────
  redis-master:
    image: redis:7-alpine
    container_name: redis-master
    ports:
      - "6379:6379"
    volumes:
      - ./redis/master.conf:/usr/local/etc/redis/redis.conf:ro
      - master-data:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      redis-cluster:
        ipv4_address: 172.28.0.10
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Redis REPLICA (172.28.0.11) ────────────────────────────────
  redis-replica:
    image: redis:7-alpine
    container_name: redis-replica
    ports:
      - "6380:6379"
    volumes:
      - ./redis/replica.conf:/usr/local/etc/redis/redis.conf:ro
      - replica-data:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      redis-cluster:
        ipv4_address: 172.28.0.11
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Redis SENTINEL 1 (172.28.0.12) ─────────────────────────────
  #    센티넬 3대(홀수) + 쿼럼 2 = 표준 구성. 1대 죽어도 2대로 페일오버 판단
  redis-sentinel:
    image: redis:7-alpine
    container_name: redis-sentinel
    ports:
      - "26379:26379"
    volumes:
      - ./redis/sentinel.conf:/etc/redis/sentinel.conf:ro
      - sentinel-data:/data
    command: sh -c "cp /etc/redis/sentinel.conf /data/sentinel.conf && redis-server /data/sentinel.conf --sentinel"
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    networks:
      redis-cluster:
        ipv4_address: 172.28.0.12
    restart: unless-stopped

  # ── Redis SENTINEL 2 (172.28.0.14) ─────────────────────────────
  redis-sentinel-2:
    image: redis:7-alpine
    container_name: redis-sentinel-2
    volumes:
      - ./redis/sentinel.conf:/etc/redis/sentinel.conf:ro
      - sentinel2-data:/data
    command: sh -c "cp /etc/redis/sentinel.conf /data/sentinel.conf && redis-server /data/sentinel.conf --sentinel"
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    networks:
      redis-cluster:
        ipv4_address: 172.28.0.14
    restart: unless-stopped

  # ── Redis SENTINEL 3 (172.28.0.15) ─────────────────────────────
  redis-sentinel-3:
    image: redis:7-alpine
    container_name: redis-sentinel-3
    volumes:
      - ./redis/sentinel.conf:/etc/redis/sentinel.conf:ro
      - sentinel3-data:/data
    command: sh -c "cp /etc/redis/sentinel.conf /data/sentinel.conf && redis-server /data/sentinel.conf --sentinel"
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    networks:
      redis-cluster:
        ipv4_address: 172.28.0.15
    restart: unless-stopped

  # ── RedisInsight (172.28.0.13 · 시각화) ────────────────────────
  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    ports:
      - "5540:5540"
    volumes:
      - ./redisinsight-data:/data    # 호스트 폴더에 저장 → down -v 에도 연결 설정 보존
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      redis-cluster:
        ipv4_address: 172.28.0.13
    restart: unless-stopped
