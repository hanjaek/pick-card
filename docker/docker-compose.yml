version: '3.8'

# ================================================================
#  BNK Pickard — Redis Master / Replica / Sentinel
#  로컬 도커 클러스터 (클라우드 없이 페일오버 구조 시연)
#
#  실행:  docker compose up -d
#  종료:  docker compose down
#  로그:  docker compose logs -f
# ================================================================

networks:
  redis-cluster:
    driver: bridge   # 컨테이너끼리 DNS 이름(redis-master 등)으로 통신

volumes:
  master-data:       # 마스터 AOF / RDB 영속 저장
  replica-data:      # 레플리카 AOF 영속 저장

services:

  # ── 1. MASTER ──────────────────────────────────────────────────
  #    모든 쓰기(SET, DEL …)의 출처 · 원본 장부
  redis-master:
    image: redis:7-alpine
    container_name: redis-master
    ports:
      - "6379:6379"          # 호스트에서 직접 접속 가능
    volumes:
      - ./redis/master.conf:/usr/local/etc/redis/redis.conf:ro
      - master-data:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - redis-cluster
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── 2. REPLICA ─────────────────────────────────────────────────
  #    마스터 데이터 실시간 복제 · 읽기 전용 부하 분산
  #    마스터 장애 시 센티넬의 지시로 새 마스터로 승격
  redis-replica:
    image: redis:7-alpine
    container_name: redis-replica
    ports:
      - "6380:6379"          # 레플리카는 6380 으로 노출
    volumes:
      - ./redis/replica.conf:/usr/local/etc/redis/redis.conf:ro
      - replica-data:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - redis-cluster
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── 3. SENTINEL ────────────────────────────────────────────────
  #    마스터 감시 · 페일오버 지휘관
  #    마스터가 down-after-milliseconds 동안 응답 없으면
  #    레플리카를 새 마스터로 승격 (Failover)
  redis-sentinel:
    image: redis:7-alpine
    container_name: redis-sentinel
    ports:
      - "26379:26379"
    volumes:
      # 주의: Sentinel은 런타임에 이 파일을 직접 수정함 (페일오버 후 주소 갱신)
      - ./redis/sentinel.conf:/usr/local/etc/redis/sentinel.conf
    command: redis-server /usr/local/etc/redis/sentinel.conf --sentinel
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    networks:
      - redis-cluster
    restart: unless-stopped
