# ============================================================
#  Redis Master 설정
#  역할: 모든 쓰기 연산의 원본. 레플리카가 여기에 복제를 요청함.
# ============================================================

port 6379
bind 0.0.0.0          # Docker 네트워크 내 모든 인터페이스 허용

# ── 영속성 (Persistence) ──────────────────────────────────────
# AOF: 모든 쓰기 명령을 로그로 기록 → 재시작 후 복구 가능
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec   # 1초마다 디스크 동기화 (성능·안전 균형)

# RDB 스냅샷 (추가 백업)
save 900 1             # 900초 안에 키 1개 이상 변경 시 저장
save 300 10            # 300초 안에 키 10개 이상 변경 시 저장
save 60  10000         # 60초 안에 키 10000개 이상 변경 시 저장

# ── 메모리 ──────────────────────────────────────────────────
maxmemory 256mb
maxmemory-policy allkeys-lru   # 메모리 초과 시 LRU 방식으로 제거

# ── 로그 ────────────────────────────────────────────────────
loglevel notice
logfile ""             # stdout 으로 출력 (docker logs 로 확인)

# ── 기타 ────────────────────────────────────────────────────
protected-mode no      # Docker 네트워크 내부 접속 허용
