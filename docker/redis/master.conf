# ============================================================
#  Redis Master 설정
#  역할: 모든 쓰기 연산의 원본. 레플리카가 여기에 복제를 요청함.
#  주의: Redis 설정은 "명령어 뒤 같은 줄 주석"을 허용하지 않음.
#        모든 주석은 반드시 # 로 시작하는 별도 줄에 작성.
# ============================================================

port 6379

# Docker 네트워크 내 모든 인터페이스 허용
bind 0.0.0.0

# ── 영속성 (Persistence) ──────────────────────────────────────
# AOF: 모든 쓰기 명령을 로그로 기록 → 재시작 후 복구 가능
appendonly yes
appendfilename "appendonly.aof"

# 1초마다 디스크 동기화 (성능·안전 균형)
appendfsync everysec

# ── RDB 스냅샷 (추가 백업) ────────────────────────────────────
# 900초 안에 키 1개 이상 변경 시 저장
save 900 1
# 300초 안에 키 10개 이상 변경 시 저장
save 300 10
# 60초 안에 키 10000개 이상 변경 시 저장
save 60 10000

# ── 메모리 ──────────────────────────────────────────────────
maxmemory 256mb
# 메모리 초과 시 LRU 방식으로 오래된 키 제거
maxmemory-policy allkeys-lru

# ── 로그 ────────────────────────────────────────────────────
loglevel notice
# stdout 으로 출력 (docker logs 로 확인)
logfile ""

# ── 기타 ────────────────────────────────────────────────────
# Docker 네트워크 내부 접속 허용
protected-mode no
