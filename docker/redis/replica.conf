# ============================================================
#  Redis Replica 설정
#  역할: 마스터의 복사본. 읽기 전용 + 마스터 장애 시 승격 대기.
#  주의: 명령어 뒤 같은 줄 주석 금지. 주석은 별도 줄에만.
# ============================================================

port 6379
bind 0.0.0.0

# ── 복제 설정 ─────────────────────────────────────────────────
# 마스터 컨테이너명과 포트 지정 (Docker 내부 DNS로 해석됨)
replicaof redis-master 6379

# 레플리카는 읽기 전용 (외부 클라이언트의 쓰기 차단)
replica-read-only yes

# 마스터 연결 끊김 시에도 읽기 요청에 (오래된) 데이터 반환 허용
replica-serve-stale-data yes

# ── 영속성 ──────────────────────────────────────────────────
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# ── 메모리 ──────────────────────────────────────────────────
maxmemory 256mb
maxmemory-policy allkeys-lru

# ── 로그 ────────────────────────────────────────────────────
loglevel notice
logfile ""

protected-mode no
