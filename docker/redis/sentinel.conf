# ============================================================
#  Redis Sentinel 설정
#  역할: 마스터/레플리카 감시 + 자동 페일오버 지휘
#
#  주의 1: 명령어 뒤 같은 줄 주석 금지. 주석은 별도 줄에만.
#  주의 2: Sentinel은 페일오버 발생 시 이 파일을 직접 수정함.
#          (새 마스터 IP가 자동으로 갱신됨)
# ============================================================

port 26379
bind 0.0.0.0

# ── Docker 내부 DNS 호스트명 해석 허용 (Redis 7+) ──────────────
# 컨테이너명(redis-master)을 IP로 변환할 수 있게 함
sentinel resolve-hostnames yes
sentinel announce-hostnames yes

# ── 마스터 모니터링 설정 ────────────────────────────────────────
# 형식: sentinel monitor <이름> <마스터HOST> <포트> <쿼럼>
# 쿼럼(quorum) 1 = 센티넬 1개가 "마스터 죽음" 동의하면 페일오버 시작
# (센티넬 3대 운영 시에는 보통 쿼럼을 2로 설정)
sentinel monitor mymaster redis-master 6379 1

# 마스터가 이 시간(ms) 동안 PING 무응답이면 주관적 다운(SDOWN) 판정
sentinel down-after-milliseconds mymaster 3000

# 페일오버 완료까지 허용하는 최대 시간 (ms)
sentinel failover-timeout mymaster 10000

# 새 마스터에 동시에 동기화할 레플리카 수 (1 = 순차 동기화)
sentinel parallel-syncs mymaster 1

# ── 페일오버 흐름 요약 ──────────────────────────────────────────
# 1. Sentinel이 redis-master에 3초간 PING 응답 없음 감지
# 2. SDOWN → 쿼럼 달성 → ODOWN(객관적 다운) 선언
# 3. redis-replica를 새 마스터로 승격 (REPLICAOF NO ONE)
# 4. 이 파일에 새 마스터 정보 자동 기록
# 5. 구 마스터가 복구되면 자동으로 새 마스터의 레플리카가 됨
