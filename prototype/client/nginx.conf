# ============================================================
#  프론트엔드 nginx — 단일 진입점
#  - /        : React 정적 빌드 서빙 (SPA 라우팅)
#  - /api     : 백엔드 서버 2대로 로드밸런싱 (한 대 죽어도 무중단)
#  - /uploads : 백엔드(약관 PDF 등) 프록시
# ============================================================

events {}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # 백엔드 서버 풀
  upstream pickard_backend {
    server pickard-server-1:4000 max_fails=1 fail_timeout=3s;
    server pickard-server-2:4000 max_fails=1 fail_timeout=3s;
  }

  server {
    listen 80;
    root   /usr/share/nginx/html;
    index  index.html;

    # API → 백엔드 (죽은 서버면 즉시 다음 서버로)
    location /api/ {
      proxy_pass http://pickard_backend;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_next_upstream error timeout http_502 http_503 http_504;
      proxy_connect_timeout 2s;
    }

    # 업로드 파일도 백엔드로
    location /uploads/ {
      proxy_pass http://pickard_backend;
    }

    # SPA: 새로고침/딥링크 시 index.html 로 폴백
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
