<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1160" viewBox="0 0 1800 1160" font-family="'Apple SD Gothic Neo','Malgun Gothic','Pretendard',sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5F6368"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1800" height="1160" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="900" y="50" text-anchor="middle" font-size="28" font-weight="700" fill="#202124">BNK Pickard 서비스 아키텍처</text>
  <text x="900" y="76" text-anchor="middle" font-size="14" fill="#5F6368">번호(①~⑥)는 아래 범례의 기술 설명과 연결됩니다</text>

  <!-- ===================== Requirement -> Tech banner ===================== -->
  <text x="60" y="100" font-size="15" font-weight="700" fill="#202124">은행 서비스에 필요한 것 → 어떤 기술로 구현했나</text>

  <rect x="40" y="110" width="280" height="55" rx="10" fill="#F8F9FA" stroke="#E0E3E7" stroke-width="1.2"/>
  <text x="180" y="143" text-anchor="middle" font-size="12.5">
    <tspan font-weight="700" fill="#202124">무중단 서비스</tspan>
    <tspan fill="#9AA0A6"> → </tspan>
    <tspan font-weight="700" fill="#F57C00">Nginx+Redis</tspan>
  </text>

  <rect x="333" y="110" width="280" height="55" rx="10" fill="#F8F9FA" stroke="#E0E3E7" stroke-width="1.2"/>
  <text x="473" y="143" text-anchor="middle" font-size="12.5">
    <tspan font-weight="700" fill="#202124">데이터 정합성</tspan>
    <tspan fill="#9AA0A6"> → </tspan>
    <tspan font-weight="700" fill="#F57C00">MySQL</tspan>
  </text>

  <rect x="626" y="110" width="280" height="55" rx="10" fill="#F8F9FA" stroke="#E0E3E7" stroke-width="1.2"/>
  <text x="766" y="143" text-anchor="middle" font-size="12.5">
    <tspan font-weight="700" fill="#202124">본인 확인</tspan>
    <tspan fill="#9AA0A6"> → </tspan>
    <tspan font-weight="700" fill="#F57C00">신분증 OCR</tspan>
  </text>

  <rect x="919" y="110" width="280" height="55" rx="10" fill="#F8F9FA" stroke="#E0E3E7" stroke-width="1.2"/>
  <text x="1059" y="143" text-anchor="middle" font-size="12.5">
    <tspan font-weight="700" fill="#202124">빠른 응답 속도</tspan>
    <tspan fill="#9AA0A6"> → </tspan>
    <tspan font-weight="700" fill="#F57C00">Redis 캐싱+Groq</tspan>
  </text>

  <rect x="1212" y="110" width="280" height="55" rx="10" fill="#F8F9FA" stroke="#E0E3E7" stroke-width="1.2"/>
  <text x="1352" y="143" text-anchor="middle" font-size="12.5">
    <tspan font-weight="700" fill="#202124">개인화 추천</tspan>
    <tspan fill="#9AA0A6"> → </tspan>
    <tspan font-weight="700" fill="#F57C00">RAG</tspan>
  </text>

  <rect x="1505" y="110" width="280" height="55" rx="10" fill="#F8F9FA" stroke="#E0E3E7" stroke-width="1.2"/>
  <text x="1645" y="143" text-anchor="middle" font-size="12.5">
    <tspan font-weight="700" fill="#202124">안정적 확장 운영</tspan>
    <tspan fill="#9AA0A6"> → </tspan>
    <tspan font-weight="700" fill="#F57C00">Docker 분리</tspan>
  </text>

  <!-- Client -->
  <rect x="90" y="465" width="240" height="90" rx="14" fill="#EEF0F3" stroke="#D5D8DC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="210" y="502" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">🧑‍💻 사용자 브라우저</text>
  <text x="210" y="530" text-anchor="middle" font-size="13" fill="#5F6368">React SPA</text>

  <line x1="330" y1="510" x2="384" y2="510" stroke="#5F6368" stroke-width="2.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <circle cx="357" cy="510" r="15" fill="#F57C00"/>
  <text x="357" y="515" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">①</text>

  <!-- Docker boundary -->
  <rect x="392" y="200" width="1038" height="600" rx="18" fill="#FFFFFF" stroke="#3C4043" stroke-width="2" stroke-dasharray="2,7" stroke-linecap="round"/>
  <text x="416" y="233" font-size="17" font-weight="700" fill="#202124">🐳 Docker</text>
  <text x="500" y="233" font-size="12.5" fill="#5F6368">— 서비스별 컨테이너 완전 분리 · healthcheck로 장애 시 자동 재기동</text>

  <!-- Nginx -->
  <rect x="460" y="453" width="240" height="114" rx="14" fill="#EEF0F3" stroke="#D5D8DC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="580" y="490" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">🌐 WEB Server</text>
  <text x="580" y="516" text-anchor="middle" font-size="13" fill="#5F6368">Nginx</text>
  <text x="580" y="546" text-anchor="middle" font-size="11.5" font-style="italic" fill="#E65100">→ 정적서빙+로드밸런싱 동시 처리</text>

  <!-- Bus 1: Nginx -> WAS#1 / WAS#2 -->
  <path d="M 700 510 L 730 510" stroke="#5F6368" stroke-width="2.5" fill="none" marker-start="url(#arrow)"/>
  <path d="M 730 330 L 730 690" stroke="#5F6368" stroke-width="2.5" fill="none"/>
  <path d="M 730 330 L 756 330" stroke="#5F6368" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 730 690 L 756 690" stroke="#5F6368" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <circle cx="730" cy="510" r="15" fill="#F57C00"/>
  <text x="730" y="515" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">②</text>

  <!-- WAS #1 -->
  <rect x="760" y="260" width="290" height="140" rx="14" fill="#EEF0F3" stroke="#D5D8DC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="905" y="316" text-anchor="middle" font-size="16" font-weight="700" fill="#202124">🖥️ WAS Server #1</text>
  <text x="905" y="342" text-anchor="middle" font-size="13.5" fill="#5F6368">Node.js</text>
  <text x="905" y="372" text-anchor="middle" font-size="11.5" font-style="italic" fill="#E65100">→ JS 통일, 비동기 처리에 강함</text>

  <!-- WAS #2 -->
  <rect x="760" y="620" width="290" height="140" rx="14" fill="#EEF0F3" stroke="#D5D8DC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="905" y="676" text-anchor="middle" font-size="16" font-weight="700" fill="#202124">🖥️ WAS Server #2</text>
  <text x="905" y="702" text-anchor="middle" font-size="13.5" fill="#5F6368">Node.js</text>
  <text x="905" y="732" text-anchor="middle" font-size="11.5" font-style="italic" fill="#E65100">→ JS 통일, 비동기 처리에 강함</text>

  <!-- Bus 2: WAS -> data column -->
  <path d="M 1050 330 L 1060 330" stroke="#5F6368" stroke-width="2.5" fill="none" marker-start="url(#arrow)"/>
  <path d="M 1050 690 L 1060 690" stroke="#5F6368" stroke-width="2.5" fill="none" marker-start="url(#arrow)"/>
  <path d="M 1060 330 L 1060 690" stroke="#5F6368" stroke-width="2.5" fill="none"/>

  <path d="M 1060 338 L 1086 338" stroke="#5F6368" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <circle cx="1073" cy="338" r="15" fill="#F57C00"/>
  <text x="1073" y="343" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">④</text>

  <path d="M 1060 490 L 1086 490" stroke="#5F6368" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <circle cx="1073" cy="490" r="15" fill="#F57C00"/>
  <text x="1073" y="495" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">③</text>

  <path d="M 1060 650 L 1086 650" stroke="#5F6368" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <circle cx="1073" cy="650" r="15" fill="#F57C00"/>
  <text x="1073" y="655" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">⑤</text>

  <!-- MySQL -->
  <rect x="1090" y="276" width="300" height="124" rx="14" fill="#EEF0F3" stroke="#D5D8DC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1240" y="317" text-anchor="middle" font-size="16" font-weight="700" fill="#202124">🗄️ 데이터베이스</text>
  <text x="1240" y="343" text-anchor="middle" font-size="13.5" fill="#5F6368">MySQL</text>
  <text x="1240" y="373" text-anchor="middle" font-size="11.5" font-style="italic" fill="#E65100">→ 관계형 데이터라 RDB가 적합</text>

  <!-- Redis -->
  <rect x="1090" y="420" width="300" height="140" rx="14" fill="#EEF0F3" stroke="#D5D8DC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1240" y="474" text-anchor="middle" font-size="16" font-weight="700" fill="#202124">💾 세션·캐시 저장소</text>
  <text x="1240" y="500" text-anchor="middle" font-size="13.5" fill="#5F6368">Redis</text>
  <text x="1240" y="530" text-anchor="middle" font-size="11.5" font-style="italic" fill="#E65100">→ 인메모리라 세션·캐시에 빠름</text>

  <!-- AI Server -->
  <rect x="1090" y="580" width="300" height="140" rx="14" fill="#EEF0F3" stroke="#D5D8DC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1240" y="634" text-anchor="middle" font-size="16" font-weight="700" fill="#202124">🤖 AI 추천·인식 서버</text>
  <text x="1240" y="660" text-anchor="middle" font-size="13.5" fill="#5F6368">FastAPI (RAG · OCR)</text>
  <text x="1240" y="690" text-anchor="middle" font-size="11.5" font-style="italic" fill="#E65100">→ AI 생태계가 Python 중심</text>

  <!-- AI -> External -->
  <path d="M 1390 650 L 1434 650" stroke="#5F6368" stroke-width="2.5" fill="none" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <circle cx="1412" cy="650" r="15" fill="#F57C00"/>
  <text x="1412" y="655" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">⑥</text>

  <!-- External LLM -->
  <rect x="1442" y="580" width="180" height="140" rx="14" fill="#EEF0F3" stroke="#D5D8DC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1532" y="634" text-anchor="middle" font-size="16" font-weight="700" fill="#202124">☁️ 외부 LLM</text>
  <text x="1532" y="660" text-anchor="middle" font-size="13.5" fill="#5F6368">Groq (기본)</text>
  <text x="1532" y="690" text-anchor="middle" font-size="11" font-style="italic" fill="#E65100">→ 무료+빠른 응답속도</text>

  <!-- ===================== Legend ===================== -->
  <text x="60" y="850" font-size="20" font-weight="700" fill="#202124">기술 설명 (발표용 요약)</text>

  <g font-size="14" fill="#202124">
    <circle cx="76" cy="890" r="14" fill="#F57C00"/><text x="76" y="895" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFFFFF">①</text>
    <text x="100" y="895">로드밸런싱 + 장애 서버 자동 우회 — 죽은 서버로는 다음 요청부터 바로 안 보냄 (max_fails=1)</text>

    <circle cx="76" cy="924" r="14" fill="#F57C00"/><text x="76" y="929" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFFFFF">②</text>
    <text x="100" y="929">WAS 이중화 — 헬스체크로 1대 죽어도 무중단, 상태를 안 들고 있어서(stateless) 수평 확장도 자유로움</text>

    <circle cx="76" cy="958" r="14" fill="#F57C00"/><text x="76" y="963" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFFFFF">③</text>
    <text x="100" y="963" font-weight="700">세션 중앙화 — 로드밸런싱해도 로그인 유지 + Redis 자체 Failover(Sentinel) + 캐시 죽어도 DB로 자동 폴백(Graceful Degradation)</text>

    <circle cx="76" cy="992" r="14" fill="#F57C00"/><text x="76" y="997" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFFFFF">④</text>
    <text x="100" y="997">영속 저장 + 정합성 — 회원·카드·신청처럼 정합성이 중요한 데이터는 RDB(MySQL)에 분리 저장</text>

    <circle cx="76" cy="1026" r="14" fill="#F57C00"/><text x="76" y="1031" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFFFFF">⑤</text>
    <text x="100" y="1031">마이크로서비스 분리 — Node.js ↔ Python을 별도 컨테이너로 분리해 한쪽 장애가 다른 쪽에 전파 안 됨</text>

    <circle cx="76" cy="1060" r="14" fill="#F57C00"/><text x="76" y="1065" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFFFFF">⑥</text>
    <text x="100" y="1065">RAG 파이프라인(임베딩→검색→재정렬→생성) + 선택형 LLM — Groq를 기본값으로, 무료·빠른 응답 속도 때문에 선택</text>
  </g>

  <rect x="40" y="1080" width="1720" height="60" rx="10" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.3"/>
  <text x="900" y="1108" text-anchor="middle" font-size="13.5" font-weight="700" fill="#E65100">💡 발표 어필 포인트: "로드밸런싱하면 로그인은 어떻게 유지되나요?" → ③ 세션 공유 / "캐시 죽으면 서비스도 죽나요?" → ③ Graceful Degradation</text>
  <text x="900" y="1128" text-anchor="middle" font-size="12" fill="#8A5000">예상 질문에 바로 답변 가능한 포인트라 강조하면 좋습니다</text>

</svg>
